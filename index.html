<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./Home.css">
</head>
  <body>
    <div class="parent">
        <div class="solid-circle"></div>


        <div class="header-home">
            <h2 class="m-0" id="head">EXPENSE TRACKER 
                <img id="expense-icon" src="./expenses.png" alt="" width="42px" height="42px">
            </h2>
            <button class="btn btn-md" id="click-here-button">CLICK HERE</button>
        </div>


        <div class="main-content">
            <h4 id="greet">Hello!👋🏻, Please Enter Your
                <br>
                <span id="Name" >Name</span>
            </h4>


            <div class="form-floating mb-3">
            <input type="text" class="form-control" id="floatingInput" placeholder="">
            <label for="floatingInput">Name Here...</label>
            </div>
            
            
            <button class="btn btn-md" id="login-button">LOGIN</button>

        </div>
    </div>



    <script>
        document.getElementById("click-here-button").onclick = function(){
            alert("Hey 😊😊😊 enter your name and let’s track your money!");
        document.getElementById("floatingInput").focus();
        };



        document.getElementById("login-button").onclick = function(){
            let name = document.getElementById("floatingInput").value;
            if(name === ""){
                alert("Hey 😏 enter your name first 😉");
                return;
            }
            localStorage.setItem("username", name);
            alert("Going to Tracker 😎"); // test
            window.location.href = "Tracker.html";
        };



</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
